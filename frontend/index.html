<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InkAI 智能小说创作系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="styles.css?v=20260630e" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- 导航栏 -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand" href="#">
                    <i class="fas fa-feather-alt me-2"></i>
                    InkAI 智能小说创作系统
                </a>
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="#" onclick="showNovelList()">
                        <i class="fas fa-list me-1"></i>小说列表
                    </a>
                </div>
            </div>
        </nav>

        <!-- 主内容区域 -->
        <div class="container mt-4">
            <!-- 欢迎页面 -->
            <div id="welcome-page" class="page">
                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <div class="text-center mb-5">
                            <h1 class="display-4 text-primary mb-3">
                                <i class="fas fa-feather-alt"></i>
                                InkAI
                            </h1>
                            <p class="lead text-muted">基于大语言模型的智能小说创作助手</p>
                            <p class="text-muted">支持从需求分析到章节生成的完整创作流程</p>
                        </div>
                        
                        <div class="row g-4">
                            <div class="col-md-4">
                                <div class="card h-100 border-0 shadow-sm">
                                    <div class="card-body text-center p-4">
                                        <div class="feature-icon mb-3">
                                            <i class="fas fa-plus-circle text-primary"></i>
                                        </div>
                                        <h5 class="card-title">开始创作新小说</h5>
                                        <p class="card-text text-muted">从零开始，创建属于你的小说世界</p>
                                        <button class="btn btn-primary" onclick="showCreateNovel()">
                                            <i class="fas fa-play me-2"></i>开始创作
                                        </button>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="col-md-4">
                                <div class="card h-100 border-0 shadow-sm">
                                    <div class="card-body text-center p-4">
                                        <div class="feature-icon mb-3">
                                            <i class="fas fa-edit text-success"></i>
                                        </div>
                                        <h5 class="card-title">续写现有小说</h5>
                                        <p class="card-text text-muted">继续你的创作之旅，让故事更加精彩</p>
                                        <button class="btn btn-success" onclick="showContinueNovel()">
                                            <i class="fas fa-arrow-right me-2"></i>续写小说
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-4">
                                <div class="card h-100 border-0 shadow-sm">
                                    <div class="card-body text-center p-4">
                                        <div class="feature-icon mb-3">
                                            <i class="fas fa-book-open text-warning"></i>
                                        </div>
                                        <h5 class="card-title">参考小说拆解</h5>
                                        <p class="card-text text-muted">上传 TXT，先评估参考价值，再决定是否深度拆解</p>
                                        <button class="btn btn-warning" onclick="showReferenceNovelAnalysis()">
                                            <i class="fas fa-magnifying-glass-chart me-2"></i>分析小说
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 创建新小说页面 -->
            <div id="create-novel-page" class="page" style="display: none;">
                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <div class="card border-0 shadow">
                            <div class="card-header bg-primary text-white">
                                <h4 class="mb-0">
                                    <i class="fas fa-plus-circle me-2"></i>创建新小说
                                </h4>
                            </div>
                            <div class="card-body p-4">
                                <form id="create-novel-form">
                                    <div class="mb-3">
                                        <label for="novel-title" class="form-label">小说标题</label>
                                        <input type="text" class="form-control" id="novel-title" 
                                               placeholder="请输入小说标题" value="未命名小说">
                                    </div>
                                    
                                    <div class="mb-4">
                                        <label for="novel-requirements" class="form-label">创作需求</label>
                                        <textarea class="form-control" id="novel-requirements" rows="4" 
                                                  placeholder="请详细描述您的创作需求，例如：想写一部都市悬疑小说，主角是侦探，有推理元素"
                                                  maxlength="5000"></textarea>
                                        <div class="form-text">
                                            <span id="requirements-count">0</span>/5000 字符
                                        </div>
                                    </div>
                                    
                                    <div class="d-flex flex-wrap gap-2">
                                        <button type="submit" class="btn btn-primary">
                                            <i class="fas fa-magic me-2"></i>开始创作
                                        </button>
                                        <button type="button" class="btn btn-outline-primary" onclick="startConceptDialogue()">
                                            <i class="fas fa-comments me-2"></i>AI 对话确认想法
                                        </button>
                                        <button type="button" class="btn btn-secondary" onclick="showWelcome()">
                                            <i class="fas fa-arrow-left me-2"></i>返回
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 续写小说页面 -->
            <div id="continue-novel-page" class="page" style="display: none;">
                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <div class="card border-0 shadow">
                            <div class="card-header bg-success text-white">
                                <h4 class="mb-0">
                                    <i class="fas fa-edit me-2"></i>续写现有小说
                                </h4>
                            </div>
                            <div class="card-body p-4">
                                <div id="novel-selection">
                                    <div class="mb-3">
                                        <label class="form-label">选择要续写的小说</label>
                                        <div id="novel-list" class="list-group">
                                            <!-- 小说列表将在这里动态加载 -->
                                        </div>
                                    </div>
                                </div>
                                
                                <div id="continuation-form" style="display: none;">
                                    <div class="mb-3">
                                        <label for="continuation-requirements" class="form-label">续写需求（可选）</label>
                                        <textarea class="form-control" id="continuation-requirements" rows="3" 
                                                  placeholder="请输入续写需求，例如：希望加快节奏，进入高潮部分"></textarea>
                                    </div>
                                    
                                    <div class="d-flex gap-2">
                                        <button type="button" class="btn btn-success" onclick="startContinuation()">
                                            <i class="fas fa-play me-2"></i>开始续写
                                        </button>
                                        <button type="button" class="btn btn-secondary" onclick="resetNovelSelection()">
                                            <i class="fas fa-arrow-left me-2"></i>重新选择
                                        </button>
                                    </div>
                                </div>
                                
                                <div class="d-flex gap-2 mt-3">
                                    <button type="button" class="btn btn-outline-secondary" onclick="showWelcome()">
                                        <i class="fas fa-arrow-left me-2"></i>返回首页
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 参考小说分析页面 -->
            <div id="reference-novel-page" class="page" style="display: none;">
                <div class="row justify-content-center">
                    <div class="col-lg-10">
                        <div class="card border-0 shadow">
                            <div class="card-header bg-warning text-dark d-flex justify-content-between align-items-center">
                                <h4 class="mb-0"><i class="fas fa-book-open me-2"></i>参考小说拆解</h4>
                                <button class="btn btn-outline-dark btn-sm" onclick="showWelcome()">
                                    <i class="fas fa-home me-1"></i>首页
                                </button>
                            </div>
                            <div class="card-body p-4">
                                <form id="reference-novel-form">
                                    <div class="row g-3">
                                        <div class="col-md-6">
                                            <label for="reference-novel-file" class="form-label">小说 TXT</label>
                                            <input class="form-control" type="file" id="reference-novel-file" accept=".txt,text/plain" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label for="reference-novel-title" class="form-label">小说名称</label>
                                            <input class="form-control" id="reference-novel-title" maxlength="120" placeholder="用于联网检索公开资料">
                                        </div>
                                        <div class="col-12">
                                            <label for="reference-target-direction" class="form-label">目标新书方向</label>
                                            <textarea class="form-control" id="reference-target-direction" rows="2" maxlength="500" placeholder="例如：番茄男频东方玄幻，快节奏成长流"></textarea>
                                        </div>
                                    </div>
                                    <div class="d-flex gap-2 mt-4">
                                        <button class="btn btn-warning" type="submit">
                                            <i class="fas fa-chart-line me-2"></i>生成参考价值报告
                                        </button>
                                        <button class="btn btn-outline-secondary" type="button" onclick="resetReferenceNovelAnalysis()">
                                            <i class="fas fa-rotate-left me-2"></i>重置
                                        </button>
                                    </div>
                                </form>

                                <div id="reference-report-container" class="mt-4" style="display:none;"></div>
                                <div id="reference-deep-progress" class="mt-4" style="display:none;"></div>
                                <div id="reference-deep-result" class="mt-4" style="display:none;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 小说列表页面 -->
            <div id="novel-list-page" class="page" style="display: none;">
                <div class="row">
                    <div class="col-12">
                        <div class="card border-0 shadow">
                            <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
                                <h4 class="mb-0">
                                    <i class="fas fa-list me-2"></i>小说列表
                                </h4>
                                <button class="btn btn-light btn-sm" onclick="showWelcome()">
                                    <i class="fas fa-arrow-left me-1"></i>返回首页
                                </button>
                            </div>
                            <div class="card-body p-4">
                                <div id="novels-container">
                                    <!-- 小说列表将在这里动态加载 -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 创作流程页面 -->
            <div id="creation-workflow-page" class="page" style="display: none;">
                <div class="row">
                    <div class="col-12">
                        <div class="card border-0 shadow">
                            <div class="card-header bg-primary text-white">
                                <div class="d-flex justify-content-between align-items-center">
                                    <h4 class="mb-0">
                                        <i class="fas fa-cogs me-2"></i>创作流程
                                    </h4>
                                    <div class="workflow-nav-buttons">
                                        <button type="button" class="btn btn-light btn-sm me-2" onclick="goToNovelList()">
                                            <i class="fas fa-arrow-left me-1"></i>返回小说列表
                                        </button>
                                        <button type="button" class="btn btn-outline-light btn-sm" onclick="goToHome()">
                                            <i class="fas fa-home me-1"></i>首页
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div class="card-body p-4">
                                <div id="workflow-container">
                                    <!-- 创作流程将在这里动态显示 -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 续写流程页面 -->
            <div id="continuation-workflow-page" class="page" style="display: none;">
                <div class="row">
                    <div class="col-12">
                        <div class="card border-0 shadow">
                            <div class="card-header bg-success text-white">
                                <div class="d-flex justify-content-between align-items-center">
                                    <h4 class="mb-0">
                                        <i class="fas fa-edit me-2"></i>续写流程
                                    </h4>
                                    <div class="workflow-nav-buttons">
                                        <button type="button" class="btn btn-light btn-sm me-2" onclick="goToContinuationNovelList()">
                                            <i class="fas fa-arrow-left me-1"></i>返回续写列表
                                        </button>
                                        <button type="button" class="btn btn-outline-light btn-sm" onclick="goToHome()">
                                            <i class="fas fa-home me-1"></i>首页
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div class="card-body p-4">
                                <div id="continuation-container">
                                    <!-- 续写流程将在这里动态显示 -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 小说规则管理页面 -->
            <div id="rules-management-page" class="page" style="display: none;">
                <div class="row">
                    <div class="col-12">
                        <div class="card border-0 shadow-sm">
                            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                                <h5 class="mb-0"><i class="fas fa-book me-2"></i>小说规则管理</h5>
                                <div>
                                    <button class="btn btn-light btn-sm me-2" onclick="startRulesDialogue()">
                                        <i class="fas fa-comments me-1"></i>AI 对话建立规则
                                    </button>
                                    <button class="btn btn-outline-light btn-sm" onclick="goBackToContinuation()">
                                        <i class="fas fa-arrow-left me-1"></i>返回续写
                                    </button>
                                </div>
                            </div>
                            <div class="card-body p-4">
                                <!-- AI 对话区域 -->
                                <div id="rules-dialogue-container" class="rules-dialogue-container mb-4" style="display:none;">
                                    <div id="rules-dialogue-messages">
                                        <!-- 对话消息动态插入 -->
                                    </div>
                                    <div class="rules-dialogue-input mt-3">
                                        <textarea class="form-control" id="rules-dialogue-input" rows="2" placeholder="描述你想要的规则..."></textarea>
                                        <button class="btn btn-primary mt-2" onclick="sendRulesMessage()">
                                            <i class="fas fa-paper-plane me-1"></i>发送
                                        </button>
                                    </div>
                                </div>
                                <!-- 规则列表区域 -->
                                <div id="rules-list-container">
                                    <div class="d-flex justify-content-between align-items-center mb-3">
                                        <h6 class="fw-bold mb-0"><i class="fas fa-list-check me-2"></i>已有规则</h6>
                                        <span class="badge bg-primary" id="rules-count">0 条</span>
                                    </div>
                                    <div id="rules-list">
                                        <div class="text-center py-5 text-muted">
                                            <i class="fas fa-inbox fa-3x mb-3"></i>
                                            <p>暂无规则，点击「AI 对话建立规则」开始</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 快速续写进度页面 -->
            <div id="quick-continuation-progress-page" class="page" style="display: none;">
                <div class="row">
                    <div class="col-12">
                        <div id="quick-continuation-progress-container">
                            <!-- 快速续写进度将在这里动态显示 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 加载提示 -->
        <div id="loading-overlay" class="loading-overlay" style="display: none;">
            <div class="loading-content">
                <div class="spinner-border text-primary mb-3" role="status">
                    <span class="visually-hidden">加载中...</span>
                </div>
                <p class="text-muted">正在处理中，请稍候...</p>
            </div>
        </div>

        <!-- 消息提示 -->
        <div id="message-container" class="position-fixed top-0 end-0 p-3" style="z-index: 1050;">
            <!-- 消息将在这里动态显示 -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js?v=20260701a"></script>

    <!-- 故事弧确认 Modal -->
    <div class="modal fade" id="arcConfirmModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title"><i class="fas fa-route me-2"></i>故事弧规划 — 请确认或修改</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body" id="arc-modal-body">
            <!-- 由 JS 动态填充 -->
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" id="arc-btn-regen">
              <i class="fas fa-sync-alt me-1"></i>重新生成
            </button>
            <button type="button" class="btn btn-outline-secondary" id="arc-btn-skip">
              跳过，不使用弧
            </button>
            <button type="button" class="btn btn-primary" id="arc-btn-confirm">
              <i class="fas fa-check me-1"></i>确认弧计划，继续写章
            </button>
          </div>
        </div>
      </div>
    </div>
</body>
</html>
